name: Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtwebsockets qtshadertools'

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install KDE Frameworks
      shell: pwsh
      run: |
        # === 1. extra-cmake-modules (زیرساخت اصلی) ===
        git clone --depth 1 --branch v6.9.0 https://invent.kde.org/frameworks/extra-cmake-modules.git
        cd extra-cmake-modules
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
        cmake --build build --config Release
        cmake --install build --prefix C:\kde
        cd ..

        # === 2. kcoreaddons (پایه تمام فریم‌ورک‌ها) ===
        git clone --depth 1 --branch v6.9.0 https://invent.kde.org/frameworks/kcoreaddons.git
        cd kcoreaddons
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF `
          -DCMAKE_PREFIX_PATH="C:\kde;$env:Qt6_DIR"
        cmake --build build --config Release
        cmake --install build --prefix C:\kde
        cd ..

        # === 3. kconfig (وابستگی حیاتی برای kglobalaccel) ===
        git clone --depth 1 --branch v6.9.0 https://invent.kde.org/frameworks/kconfig.git
        cd kconfig
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF `
          -DCMAKE_PREFIX_PATH="C:\kde;$env:Qt6_DIR"
        cmake --build build --config Release
        cmake --install build --prefix C:\kde
        cd ..

        # === 4. kdbusaddons (وابستگی حیاتی برای kglobalaccel در ویندوز) ===
        git clone --depth 1 --branch v6.9.0 https://invent.kde.org/frameworks/kdbusaddons.git
        cd kdbusaddons
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF `
          -DCMAKE_PREFIX_PATH="C:\kde;$env:Qt6_DIR"
        cmake --build build --config Release
        cmake --install build --prefix C:\kde
        cd ..

        # === 5. kirigami (رابط کاربری) ===
        git clone --depth 1 --branch v6.9.0 https://invent.kde.org/frameworks/kirigami.git
        cd kirigami
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF `
          -DCMAKE_PREFIX_PATH="C:\kde;$env:Qt6_DIR"
        cmake --build build --config Release
        cmake --install build --prefix C:\kde
        cd ..

        # === 6. kglobalaccel (میانبرهای کیبورد - با فلگ دور زدن چک پلتفرم) ===
        git clone --depth 1 --branch v6.9.0 https://invent.kde.org/frameworks/kglobalaccel.git
        cd kglobalaccel
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF `
          -DCMAKE_PREFIX_PATH="C:\kde;$env:Qt6_DIR" `
          -DKF_IGNORE_PLATFORM_CHECK=ON
        cmake --build build --config Release
        cmake --install build --prefix C:\kde
        cd ..

    - name: Configure CMake
      shell: pwsh
      run: |
        cmake -B build `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="C:\kde;$env:Qt6_DIR" `
          -DCMAKE_INSTALL_PREFIX="C:\TAMprompt" `
          -G "Visual Studio 17 2022" -A x64

    - name: Build
      shell: pwsh
      run: cmake --build build --config Release -j4

    - name: Install
      shell: pwsh
      run: cmake --install build --config Release

    - name: Deploy Qt
      shell: pwsh
      run: |
        windeployqt --qmldir src C:\TAMprompt\bin\TAMprompt.exe

    - name: Package
      shell: pwsh
      run: |
        Compress-Archive -Path C:\TAMprompt\* -DestinationPath TAMprompt-Windows.zip

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: TAMprompt-Windows
        path: TAMprompt-Windows.zip
